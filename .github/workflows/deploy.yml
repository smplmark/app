name: Deploy

# Deploy the app Worker (app.smplmark.org) on every push to main. Gated on typecheck + the full test
# suite so a broken push never ships. Forward D1 migrations are applied before the Worker deploy so
# code and schema stay in sync. Requires one repo secret: CLOUDFLARE_API_TOKEN (the account id is
# pinned in wrangler.jsonc). Until that secret is set (pre-cutover), the deploy job no-ops so CI stays
# green — see the cutover steps in README.md.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Coverage, not plain `npm test`: vitest's coverage thresholds (vitest.config.ts) only run —
      # and only fail the build — under --coverage, so this is what makes the 90% gate enforce.
      - run: npm run test:coverage

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      # wrangler reads this for auth; runs non-interactively because GitHub Actions sets CI=true.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Safety net: if CLOUDFLARE_API_TOKEN is ever unavailable, skip the deploy so CI stays green
      # rather than failing on auth. It's normally present (an org-level secret on smplmark/*).
      - name: Skip deploy (no CLOUDFLARE_API_TOKEN)
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "::notice::CLOUDFLARE_API_TOKEN not available — skipping deploy."
      # Both commands are idempotent (migrations are tracked in d1_migrations; a deploy re-uploads the
      # same version), so a bounded retry safely absorbs transient Cloudflare API 5xx blips (e.g. the
      # D1 query endpoint's intermittent "internal error [code: 7500]") without risking partial state.
      - name: Apply D1 migrations (forward-only)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          n=0
          until [ "$n" -ge 5 ]; do
            npx wrangler d1 migrations apply smplmark --remote && break
            n=$((n + 1))
            echo "::warning::migration apply attempt $n failed (transient Cloudflare API error?); retrying in 20s"
            sleep 20
          done
          [ "$n" -lt 5 ]
      - name: Deploy Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          n=0
          until [ "$n" -ge 5 ]; do
            npx wrangler deploy && break
            n=$((n + 1))
            echo "::warning::deploy attempt $n failed (transient Cloudflare API error?); retrying in 20s"
            sleep 20
          done
          [ "$n" -lt 5 ]
      # Source of truth for the Worker's runtime secrets is GitHub Actions repo secrets — CI pushes
      # them to the Worker on every deploy (smplkit standard). Only secrets that are actually set are
      # pushed: an unset repo secret is omitted, so it can never clobber a live value on the Worker.
      # (APP_URL is intentionally NOT here — it's derived from the request origin; see config.ts.)
      - name: Sync Worker secrets from repo secrets
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          APP_AUTH_SECRET: ${{ secrets.APP_AUTH_SECRET }}
          KEY_ENCRYPTION_SECRET: ${{ secrets.KEY_ENCRYPTION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GOOGLE_OIDC_CLIENT_ID: ${{ secrets.GOOGLE_OIDC_CLIENT_ID }}
          GOOGLE_OIDC_CLIENT_SECRET: ${{ secrets.GOOGLE_OIDC_CLIENT_SECRET }}
          MICROSOFT_OIDC_CLIENT_ID: ${{ secrets.MICROSOFT_OIDC_CLIENT_ID }}
          MICROSOFT_OIDC_CLIENT_SECRET: ${{ secrets.MICROSOFT_OIDC_CLIENT_SECRET }}
          JOBS_TRIGGER_SECRET: ${{ secrets.JOBS_TRIGGER_SECRET }}
          SMPLKIT_API_KEY: ${{ secrets.SMPLKIT_API_KEY }}
        run: |
          node -e 'const n=["APP_AUTH_SECRET","KEY_ENCRYPTION_SECRET","RESEND_API_KEY","RESEND_FROM","GOOGLE_OIDC_CLIENT_ID","GOOGLE_OIDC_CLIENT_SECRET","MICROSOFT_OIDC_CLIENT_ID","MICROSOFT_OIDC_CLIENT_SECRET","JOBS_TRIGGER_SECRET","SMPLKIT_API_KEY"];const o={};for(const k of n)if(process.env[k])o[k]=process.env[k];process.stdout.write(JSON.stringify(o))' > "$RUNNER_TEMP/secrets.json"
          if [ "$(cat "$RUNNER_TEMP/secrets.json")" = "{}" ]; then
            echo "::notice::no app repo secrets set yet — skipping secret sync (Worker keeps its current secrets)"
          else
            npx wrangler secret bulk "$RUNNER_TEMP/secrets.json"
          fi
          rm -f "$RUNNER_TEMP/secrets.json"
