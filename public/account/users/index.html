<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Users — smplmark</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/img/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/console.css" />
</head>
<body>
  <div class="appShell">
    <aside class="sidebar" id="sm-sidebar"></aside>
    <div class="appMain">
      <header class="topBar" id="sm-topbar"></header>
      <main class="appContent">
        <div class="page">
          <div id="load-error"></div>

          <div class="toolbar">
            <div class="toolbarSearch" id="user-search-wrap"></div>
            <div class="toolbarSpacer"></div>
            <div class="segmented" id="user-tabs">
              <button type="button" class="segBtn isActive" data-tab="users">Active</button>
              <button type="button" class="segBtn" data-tab="invites">Invited</button>
            </div>
            <select class="filterSelect" id="role-filter" aria-label="Filter by role">
              <option value="">All roles</option>
              <option value="OWNER">Owner</option>
              <option value="ADMIN">Admin</option>
              <option value="MEMBER">Member</option>
              <option value="VIEWER">Viewer</option>
            </select>
            <button type="button" class="toolbarIconBtn" id="user-refresh" title="Refresh" aria-label="Refresh"></button>
          </div>

          <div id="user-content"></div>
          <div id="users-msg" class="form-status"></div>
        </div>
      </main>
    </div>
  </div>

  <script>window.SM_PAGE = { active: "members", breadcrumbs: [{ label: "Users" }] };</script>
  <script src="/js/api.js"></script>
  <script src="/js/shell.js"></script>
  <script src="/js/console-users.js"></script>
</body>
</html>
